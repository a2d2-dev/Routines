# Default values for routines Helm chart.

## Controller deployment configuration.
controller:
  image:
    repository: ghcr.io/a2d2-dev/routines-controller
    tag: ""  # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Leader election enables HA for the controller.
  leaderElection:
    enabled: true

  serviceAccount:
    create: true
    name: ""
    annotations: {}

## Gateway deployment configuration.
gateway:
  image:
    repository: ghcr.io/a2d2-dev/routines-gateway
    tag: ""  # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 8080

  # PVC for the Gateway file queue.
  persistence:
    storageClass: ""
    size: 10Gi
    accessMode: ReadWriteOnce

  # File queue tuning.
  leaseTTL: "5m"
  reaperInterval: "30s"
  defaultWait: "30s"
  maxWait: "2m"

  # Optional: reference a K8s Secret containing the GitHub App webhook secret.
  # If set, GATEWAY_GITHUB_WEBHOOK_SECRET is injected from the secret.
  # githubWebhookSecret:
  #   secretName: routines-github-webhook
  #   secretKey: secret
  githubWebhookSecret: {}

  serviceAccount:
    create: true
    name: ""
    annotations: {}

## Agent sandbox image used for Routine pods (managed by the Controller).
## Users may override this to include additional tools or pin Claude Code versions.
agentImage:
  repository: ghcr.io/a2d2-dev/sandbox
  tag: latest
  pullPolicy: IfNotPresent

## Install CRDs via the chart.
## Set to false if you manage CRDs separately (e.g. via the crds/ directory).
crds:
  install: true

## Namespace to deploy into.
## Defaults to the Helm release namespace.
namespaceOverride: ""
