---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "routines.fullname" . }}-gateway-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "routines.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  accessModes:
    - {{ .Values.gateway.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.gateway.persistence.size }}
  {{- if .Values.gateway.persistence.storageClass }}
  storageClassName: {{ .Values.gateway.persistence.storageClass }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "routines.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "routines.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "routines.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "routines.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: {{ include "routines.gateway.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: {{ include "routines.gateway.image" . }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command:
            - /gateway
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "routines.fullname" . }}-gateway-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "routines.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "routines.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "routines.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
