apiVersion: routines.a2d2.dev/v1alpha1
kind: ConnectorBinding
metadata:
  name: anthropic-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: routines
    app.kubernetes.io/managed-by: kustomize
spec:
  secretRef:
    name: anthropic-secret
  scope: readonly
  inject:
    - as: env
      key: API_KEY
      envName: ANTHROPIC_AUTH_TOKEN
    - as: env
      key: BASE_URL
      envName: ANTHROPIC_BASE_URL
    - as: env
      key: MODEL
      envName: ANTHROPIC_MODEL
